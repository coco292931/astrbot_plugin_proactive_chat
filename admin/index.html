<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 允许移动端缩放，避免管理端在高 DPI / 小屏设备上不可读。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>主动消息管理端</title>

    <!-- favicon 指向插件根目录的 logo，便于浏览器标签页识别。 -->
    <link rel="icon" type="image/png" href="../logo.png">

    <!-- 预加载字体样式，减少首屏闪烁。 -->
    <link rel="preload" href="fonts/outfit.css" as="style">
    <link href="fonts/outfit.css" rel="stylesheet">

    <!-- 全局样式表，承载布局、卡片、主题变量等基础样式。 -->
    <link rel="stylesheet" href="css/style.css">

    <!-- 以 UMD 方式引入 React / Babel / MUI。
         根据用户时区/语言自动选择 CDN：国内走 npmmirror，国外走 unpkg。 -->
    <script>
    (function() {
        // 通过时区和语言判断是否为国内用户，安全降级到 unpkg。
        var tz = '';
        try {
            if (typeof Intl !== 'undefined' && Intl.DateTimeFormat) {
                tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
            }
        } catch (e) {}
        var lang = (navigator.language || '').toLowerCase();
        var isCN = tz === 'Asia/Shanghai' || tz === 'Asia/Chongqing' || tz === 'Asia/Urumqi'
                || lang === 'zh-cn';

        var base = isCN ? 'https://registry.npmmirror.com' : 'https://unpkg.com';
        var libs = isCN ? [
            '/react/18.2.0/files/umd/react.production.min.js',
            '/react-dom/18.2.0/files/umd/react-dom.production.min.js',
            '/@babel/standalone/7.25.6/files/babel.min.js',
            '/@mui/material/5.16.7/files/umd/material-ui.production.min.js',
            '/@emotion/react/11.13.3/files/dist/emotion-react.umd.min.js',
            '/@emotion/styled/11.13.0/files/dist/emotion-styled.umd.min.js',
            '/marked/14.1.2/files/marked.min.js',
            '/dompurify/3.1.6/files/dist/purify.min.js',
            '/mermaid/11.4.1/files/dist/mermaid.min.js'
        ] : [
            '/react@18.2.0/umd/react.production.min.js',
            '/react-dom@18.2.0/umd/react-dom.production.min.js',
            '/@babel/standalone@7.25.6/babel.min.js',
            '/@mui/material@5.16.7/umd/material-ui.production.min.js',
            '/@emotion/react@11.13.3/dist/emotion-react.umd.min.js',
            '/@emotion/styled@11.13.0/dist/emotion-styled.umd.min.js',
            '/marked@14.1.2/marked.min.js',
            '/dompurify@3.1.6/dist/purify.min.js',
            '/mermaid@11.4.1/dist/mermaid.min.js'
        ];

        // 通过 DOM API 创建 script 元素，兼容 CSP 且比 document.write 更可靠。
        var head = document.head || document.getElementsByTagName('head')[0];
        for (var i = 0; i < libs.length; i++) {
            var s = document.createElement('script');
            s.src = base + libs[i];
            s.defer = true;
            if (i < 2) s.crossOrigin = 'anonymous';
            head.appendChild(s);
        }
    })();
    </script>
</head>

<body>
    <!-- 启动画面：在 React 应用加载前先提供一个可见的骨架屏，避免白屏。 -->
    <div id="loading-skeleton" class="boot-loader">
        <div class="boot-loader__logo">
            <img src="../logo.png" alt="logo">
        </div>
        <div class="boot-loader__title">主动消息管理端</div>
        <div class="boot-loader__subtitle" id="boot-text">正在初始化...</div>
        <div id="boot-login" class="boot-login">
            <label for="boot-password" class="boot-login__label">管理端密码</label>
            <input id="boot-password" class="boot-login__input" type="password" autocomplete="current-password" placeholder="请输入访问密码">
            <button id="boot-login-button" class="boot-login__button" type="button">
                登录进入
            </button>
        </div>
        <div class="boot-loader__progress">
            <div class="boot-loader__progress-bar"></div>
        </div>
    </div>

    <!-- React 根节点；所有前端界面最终都会挂到这里。 -->
    <div id="root"></div>

    <!-- 工具脚本必须先于 JSX 模块加载，以便后者可直接使用 window 上的工具对象。 -->
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/http.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/markdown.js"></script>

    <script>
        (function () {
            // 该标记用于阻止 React 应用过早启动，直到鉴权探测流程结束后再解除。
            window.__PROACTIVE_AUTH_PENDING = true;

            var bootLoginEventsBound = false;

            function proceed() {
                // 告知其余脚本：鉴权检查已完成，可以开始渲染业务界面。
                window.__PROACTIVE_AUTH_PENDING = false;
                window.dispatchEvent(new Event('auth-ready'));

                // 延迟关闭骨架屏，让首屏过渡更柔和，避免闪烁。
                setTimeout(function() {
                    var skeleton = document.getElementById('loading-skeleton');
                    if (skeleton) {
                        skeleton.classList.add('is-exiting');
                        setTimeout(function() {
                            if (skeleton.parentNode) skeleton.parentNode.removeChild(skeleton);
                        }, 300);
                    }
                }, 500);
            }

            function showError(msg) {
                // 启动失败时直接在骨架屏上输出错误信息，避免用户只看到空白页。
                const text = document.getElementById('boot-text');
                if (text) {
                    text.textContent = msg;
                    text.style.color = '#B3261E';
                }
            }

            function showInfo(msg) {
                const text = document.getElementById('boot-text');
                if (text) {
                    text.textContent = msg;
                    text.style.color = '#D05F00';
                }
            }

            function setLoginBusy(busy) {
                var button = document.getElementById('boot-login-button');
                var input = document.getElementById('boot-password');
                if (button) {
                    button.disabled = !!busy;
                    button.style.opacity = busy ? '0.72' : '1';
                    button.textContent = busy ? '登录中...' : '登录进入';
                }
                if (input) {
                    input.disabled = !!busy;
                }
            }

            function showLoginForm(message) {
                var login = document.getElementById('boot-login');
                var input = document.getElementById('boot-password');
                var button = document.getElementById('boot-login-button');
                if (login) login.style.display = 'block';
                if (message) showError(message);
                setLoginBusy(false);

                if (!button || !input) {
                    if (input) setTimeout(function () { input.focus(); }, 0);
                    return;
                }

                function submitLogin() {
                    var password = input.value || '';
                    if (!password.trim()) {
                        showError('请输入管理端密码');
                        input.focus();
                        return;
                    }

                    setLoginBusy(true);
                    showInfo('正在验证密码...');
                    fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ password: password }),
                    })
                        .then(function (res) {
                            return res.json()
                                .then(function (data) {
                                    return { ok: res.ok, data: data };
                                })
                                .catch(function () {
                                    return { ok: res.ok, data: null };
                                });
                        })
                        .then(function (result) {
                            if (!result.ok) {
                                var errorMessage = result.data && result.data.error ? result.data.error : '登录失败';
                                throw new Error(errorMessage);
                            }
                            var token = result.data && result.data.token;
                            if (!token) {
                                throw new Error('登录成功但未获取到访问令牌');
                            }
                            window.AuthUtil.setToken(token);
                            proceed();
                        })
                        .catch(function (err) {
                            showError(err && err.message ? err.message : '登录失败，请稍后重试');
                            setLoginBusy(false);
                            input.focus();
                            input.select();
                        });
                }

                if (!bootLoginEventsBound) {
                    button.addEventListener('click', submitLogin);
                    input.addEventListener('keydown', function (event) {
                        if (event.key === 'Enter') {
                            event.preventDefault();
                            submitLogin();
                        }
                    });
                    bootLoginEventsBound = true;
                }
                setTimeout(function () { input.focus(); }, 0);
            }

            function verifyExistingToken(token) {
                // 通过访问受保护接口来验证 token 是否仍然有效。
                return fetch('/api/status', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                    },
                }).then(function (res) {
                    if (res.status === 401) {
                        // 若 token 失效，则清理本地缓存，避免前端继续携带错误凭证。
                        window.AuthUtil.clearToken();
                        showLoginForm('访问令牌已失效，请重新登录');
                        return;
                    }
                    if (!res.ok) {
                        throw new Error('管理端鉴权校验失败，请稍后重试');
                    }
                    proceed();
                });
            }

            // 第一步：询问后端当前是否启用了管理端密码。
            fetch('/api/auth-info')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (!data.auth_required) {
                        // 无需鉴权时立即放行，进入应用初始化。
                        proceed();
                        return;
                    }

                    // 已启用鉴权时，从 localStorage 中取出历史 token 进行有效性验证。
                    var token = window.AuthUtil.getToken();
                    if (!token) {
                        showLoginForm('请输入管理端密码以继续访问');
                        return;
                    }

                    return verifyExistingToken(token);
                })
                .catch(function () {
                    // 管理端不可达通常意味着后端服务未启动或网络异常。
                    showError('管理端连接失败，请检查插件状态');
                });
        })();
    </script>

    <!-- 以下 JSX 文件按“基础能力 -> 布局组件 -> 页面视图 -> 应用入口”的顺序加载。 -->
    <script type="text/babel" src="js/context/AppContext.jsx" defer></script>
    <script type="text/babel" src="js/hooks/useApi.js" defer></script>
    <script type="text/babel" src="js/hooks/useWebSocket.js" defer></script>
    <script type="text/babel" src="js/components/layout/Sidebar.jsx" defer></script>
    <script type="text/babel" src="js/components/layout/Header.jsx" defer></script>
    <script type="text/babel" src="js/views/StatusView.jsx" defer></script>
    <script type="text/babel" src="js/components/config/ConfigRenderer.jsx" defer></script>
    <script type="text/babel" src="js/views/ConfigView.jsx" defer></script>
    <script type="text/babel" src="js/views/TasksView.jsx" defer></script>
    <script type="text/babel" src="js/views/NotificationsView.jsx" defer></script>
    <script type="text/babel" src="js/views/MarkdownDocsView.jsx" defer></script>
    <script type="text/babel" src="js/app.jsx" defer></script>
</body>

</html>
